name: Deploy Backend

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'

concurrency:
  group: backend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Pull Vercel Environment
        working-directory: backend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }} --scope=pizza-dao

      - name: Build
        working-directory: backend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        working-directory: backend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=pizza-dao
